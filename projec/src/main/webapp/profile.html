<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <section class="student-profile">
            <h2>Student Profile</h2>
            <form>
                <div class="profile-section">
                    <ul>
                        <li>
                            <h3>Personal Information</h3>
                            <label for="fullName">Full Name:</label>
                            <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required><br><br>
                            <label for="dateOfBirth">Date of Birth:</label>
                            <input type="date" id="dateOfBirth" name="dateOfBirth" required><br><br>
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email address" required><br><br>
                            <label for="phone">Phone:</label>
                            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required><br><br>
                            <label for="address">Address:</label>
                            <textarea id="address" name="address" rows="4" placeholder="Enter your address" required></textarea>
                        </li>
                        <li>
                            <div class="profile-section">
                                <h3>Educational Background</h3>
                                <label for="university">University:</label>
                                <input type="text" id="university" name="university" placeholder="Enter your university name" required><br><br>
                                <label for="degree">Degree:</label>
                                <input type="text" id="degree" name="degree" placeholder="Enter your degree" required><br><br>
                                <label for="graduationYear">Graduation Year:</label>
                                <input type="number" id="graduationYear" name="graduationYear" placeholder="Enter your graduation year" required><br><br>
                                <label for="gpa">GPA:</label>
                                <input type="number" id="gpa" name="gpa" step="0.01" placeholder="Enter your GPA" required><br><br>
                            </div>
                        </li>
                        <li>
                            <div class="profile-section">
                                <h3>Skills</h3>
                                <label for="skills">Skills:</label>
                                <textarea id="skills" name="skills" rows="4" placeholder="Enter your skills (e.g., Java, Python, HTML)" required></textarea>
                            </div>
                        </li>
                        <li>
                            <div class="profile-section">
                                <h3>Additional Information</h3>
                                <label for="additionalInfo">Additional Information:</label>
                                <textarea id="additionalInfo" name="additionalInfo" rows="6" placeholder="Enter any additional information you'd like to share"></textarea>
                            </div>
                        </li>
                    </ul>
                    <button type="submit">Save Profile</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
